# ─────────────────────────────────────────────────────────────
#  SonarQube Configuration — UK-DALE NILM ML Project
#  File: sonar-project.properties
#
#  Place this file at the root of your project.
#  The Jenkinsfile passes most of these as CLI args too,
#  so this file acts as a local fallback for manual scans.
# ─────────────────────────────────────────────────────────────

# ── Project Identity ──────────────────────────────────────────
sonar.projectKey=nilm-ml-project
sonar.projectName=UK-DALE NILM ML Project
sonar.projectVersion=1.0

# ── Source ────────────────────────────────────────────────────
sonar.sources=.
sonar.language=py

# Files/folders to exclude from analysis
sonar.exclusions=\
    **/__pycache__/**,\
    **/.venv/**,\
    **/htmlcov/**,\
    **/outputs/**,\
    **/models/**,\
    **/*.egg-info/**,\
    **/node_modules/**

# Test sources
sonar.tests=tests/
sonar.test.inclusions=tests/test_*.py

# ── Python-specific ───────────────────────────────────────────
# Coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# JUnit XML report generated by pytest
sonar.python.xunit.reportPath=test-results.xml

# ── Encoding ──────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Quality Gate ─────────────────────────────────────────────
# Uses the default "Sonar way" gate unless you create a custom one
# in SonarQube UI → Quality Gates

# ── Connection (override with env vars in CI) ─────────────────
# sonar.host.url=http://localhost:9000
# sonar.token=<your-token>         # set via SONAR_TOKEN env var in Jenkins
