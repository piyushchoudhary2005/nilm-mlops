version: "3.9"

# ─────────────────────────────────────────────────────────────
#  UK-DALE NILM Project — Full DevOps Stack
#  Services: jenkins | sonarqube | sonarqube-db | nilm-app
#
#  Usage:
#    docker-compose up -d            # start all services
#    docker-compose logs -f jenkins  # watch Jenkins logs
#    docker-compose down -v          # stop + remove volumes
# ─────────────────────────────────────────────────────────────

networks:
  nilm-net:
    driver: bridge

volumes:
  jenkins_home:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  postgres_data:

services:

  # ── Jenkins ──────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: unless-stopped
    privileged: true                      # needed for Docker-in-Docker
    user: root
    ports:
      - "8081:8080"                       # Jenkins UI
      - "50000:50000"                     # Agent JNLP
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # share host Docker daemon
    networks:
      - nilm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── SonarQube Database (PostgreSQL) ──────────────────────
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nilm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SonarQube ─────────────────────────────────────────────
  sonarqube:
    image: sonarqube:10-community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      - "9000:9000"                       # SonarQube UI
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - nilm-net
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── NILM ML App ───────────────────────────────────────────
  nilm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nilm-app
    restart: unless-stopped
    ports:
      - "7860:7860"                       # Gradio UI
    environment:
      - PYTHONUNBUFFERED=1
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    volumes:
      - ./models:/app/models              # persist trained model artefacts
      - ./outputs:/app/outputs            # persist plots / reports
    networks:
      - nilm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
